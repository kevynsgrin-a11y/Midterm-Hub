name: deploy-site

# Builds the Plumbline static site (midtermwatch.com) and publishes it to GitHub Pages.
# Cloudflare Pages is an alternative host — same scripts/build-site.sh, output "dist".
# See DEPLOY.md for the one-time host + Cloudflare DNS setup.
# Data comes from the curated intake/*.yaml files — every record verified against
# an official source before commit.

# Runs on the default branch and on manual dispatch only — not on feature branches,
# so an un-provisioned Pages site never shows as a failing check on a PR.
# One-time setup: Settings → Pages → Source: "GitHub Actions".
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly rebuild so on-page relative countdowns stay fresh between commits.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Build dataset + site (midtermwatch.com)
        env:
          SITE_ORIGIN: https://midtermwatch.com
          SITE_CNAME: midtermwatch.com
        run: bash scripts/build-site.sh _site

      - uses: actions/configure-pages@v5
        with:
          # Enable Pages (Actions build type) on first run so no manual toggle is needed.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
